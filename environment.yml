name: d3d-stgnn
channels:
  - conda-forge
dependencies:
  - python=3.11
  - pip

  # Scientific + IO
  - numpy
  - scipy
  - pandas
  - xarray
  - dask
  - netcdf4
  - h5netcdf
  - zarr
  - numcodecs

  # utilities
  - tqdm
  - rich
  - matplotlib

  # optional (CPU-only)
  - pip:
      - torch
      - torchvision
      - torchaudio

